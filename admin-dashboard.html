<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body data-page="dashboard">

<div class="dashboard">

    <aside class="sidebar">
        <h2 class="logo">Admin Panel</h2>
        <ul class="menu">
            <li><a href="admin-dashboard.html" data-nav="dashboard">Dashboard</a></li>
            <li><a href="admin-doctors.html" data-nav="doctors">Doctors</a></li>
            <li><a href="admin-add-doctor.html" data-nav="add-doctor">Add Doctor</a></li>
            <li><a href="admin-bookings.html" data-nav="bookings">Bookings</a></li>
            <li><a href="index.html">Back to Website</a></li>
        </ul>
    </aside>

    <div id="overlay" class="overlay"></div>

    <main class="main-content">

        <header class="top-bar">
            <div class="top-left">
                <button id="menu-toggle" class="menu-btn" type="button" aria-label="Open menu">&#9776;</button>
                <h1>Dashboard Overview</h1>
            </div>
            <button id="logout-btn">Logout</button>
        </header>

        <p class="page-subtitle">
            Monitor doctors and bookings from one place.
            <span id="dashboard-date"></span>
        </p>

        <div class="dashboard-overview">
            <section class="card stats-card">
                <h2>Total Doctors</h2>
                <p id="total-doctors">0</p>
            </section>

            <section class="card stats-card">
                <h2>Total Bookings</h2>
                <p id="total-bookings">0</p>
            </section>

            <section class="card stats-card">
                <h2>Today's Bookings</h2>
                <p id="today-bookings">0</p>
            </section>
        </div>

        <section class="card quick-actions">
            <h2>Quick Actions</h2>
            <div class="quick-grid">
                <a class="quick-link" href="admin-add-doctor.html">Add New Doctor</a>
                <a class="quick-link" href="admin-doctors.html">Manage Doctors</a>
                <a class="quick-link" href="admin-bookings.html">Review Bookings</a>
            </div>
        </section>

    </main>

</div>

<script src="js/data.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
