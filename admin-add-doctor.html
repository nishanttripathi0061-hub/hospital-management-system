<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Doctor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body data-page="add-doctor">

<div class="dashboard">

    <aside class="sidebar">
        <h2 class="logo">Admin Panel</h2>
        <ul class="menu">
            <li><a href="admin-dashboard.html" data-nav="dashboard">Dashboard</a></li>
            <li><a href="admin-doctors.html" data-nav="doctors">Doctors</a></li>
            <li><a href="admin-add-doctor.html" data-nav="add-doctor">Add Doctor</a></li>
            <li><a href="admin-bookings.html" data-nav="bookings">Bookings</a></li>
            <li><a href="index.html">Back to Website</a></li>
        </ul>
    </aside>

    <div id="overlay" class="overlay"></div>

    <main class="main-content">

        <header class="top-bar">
            <div class="top-left">
                <button id="menu-toggle" class="menu-btn" type="button" aria-label="Open menu">&#9776;</button>
                <h1>Add New Doctor</h1>
            </div>
            <button id="logout-btn">Logout</button>
        </header>

        <p class="page-subtitle">Create complete doctor profiles with slots and availability.</p>

        <section class="card">
            <div class="card-head">
                <h2>Doctor Details</h2>
            </div>
            <form id="add-doctor-form" class="doctor-form-grid">

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="doc-name" required>
                </div>

                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" id="doc-specialization" required>
                </div>

                <div class="form-group">
                    <label>Experience (Years)</label>
                    <input type="number" id="doc-experience" required>
                </div>

                <div class="form-group">
                    <label>Fee (INR)</label>
                    <input type="number" id="doc-fee" required>
                </div>

                <div class="form-group">
                    <label>Rating</label>
                    <input type="number" step="0.1" min="1" max="5" id="doc-rating" required>
                </div>

                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="doc-image" required>
                </div>

                <div class="form-group form-span-full">
                    <label>Slots (comma separated)</label>
                    <input type="text" id="doc-slots" placeholder="10:00 AM, 11:00 AM, 12:00 PM">
                </div>

                <button type="submit" class="primary-btn form-span-full">
                    Add Doctor
                </button>

            </form>
        </section>

    </main>

</div>
<script src="js/data.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
